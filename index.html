<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#c0392b">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Aslan — пенсионный аннуитет · калькулятор</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --accent: #c0392b;
  --accent-light: #e74c3c;
  --bg: #f2f2f7;
  --card: #ffffff;
  --card-border: rgba(0,0,0,0.06);
  --separator: rgba(60,60,67,0.12);
  --label: #3c3c43;
  --label2: #8e8e93;
  --green: #34c759;
  --green-bg: #d4f5dc;
  --yellow: #ff9f0a;
  --yellow-bg: #fff3cd;
  --red: #ff3b30;
  --red-bg: #ffd4d1;
  --radius: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: #1c1c1e;
  font-size: 15px;
  line-height: 1.4;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  padding-bottom: calc(140px + var(--safe-bottom));
}

.app { max-width: 700px; margin: 0 auto; padding: 0; }

/* ─── Header ─── */
.header {
  background: var(--accent);
  color: #fff;
  padding: calc(12px + var(--safe-top)) 16px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1.header-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.2px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  line-height: 1.2;
}
.header .header-brand { font-size: 16px; font-weight: 700; }
.header .header-sub { font-size: 12px; font-weight: 600; opacity: 0.92; max-width: 260px; }
.header .ver { font-size: 12px; opacity: .7; flex-shrink: 0; }

/* ─── Cards ─── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  margin: 12px 16px;
  overflow: hidden;
  box-shadow: 0 0 0 0.5px var(--card-border), 0 1px 3px rgba(0,0,0,0.04);
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--label2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 24px 16px 6px;
  margin: 0 16px;
}
.card-title:first-child { padding-top: 8px; }

/* ─── Rows ─── */
.row {
  display: flex;
  align-items: center;
  min-height: 44px;
  padding: 0 16px;
  gap: 8px;
  border-bottom: 0.5px solid var(--separator);
}
.row:last-child { border-bottom: none; }
.row label {
  flex: 1;
  font-size: 15px;
  color: var(--label);
  line-height: 1.3;
  padding: 10px 0;
}
.row label.small { font-size: 13px; color: var(--label2); }
.row label b { font-weight: 600; color: #1c1c1e; }
.row .val {
  font-size: 15px;
  font-weight: 600;
  color: #1c1c1e;
  text-align: right;
  white-space: nowrap;
  padding: 4px 0;
  font-variant-numeric: tabular-nums;
}
.row .val.highlight {
  background: var(--yellow-bg);
  color: #7a5d00;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 14px;
}
.row .val.green {
  background: var(--green-bg);
  color: #1a7a2e;
  padding: 4px 10px;
  border-radius: 8px;
}
.row .val.red {
  background: var(--red-bg);
  color: var(--red);
  padding: 4px 10px;
  border-radius: 8px;
}

/* ─── Inputs ─── */
.row input[type="text"],
.row input[type="number"],
.row select {
  font-family: var(--font);
  font-size: 15px;
  font-weight: 500;
  color: var(--accent);
  text-align: right;
  border: none;
  background: transparent;
  padding: 10px 0;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  min-width: 0;
  font-variant-numeric: tabular-nums;
}
.row input.date-input {
  width: 140px;
  text-align: right;
  letter-spacing: 0.3px;
}
.row input.money-input {
  width: 140px;
}
.row input[type="number"] { width: 80px; }
.row select {
  color: var(--accent);
  background: transparent;
  padding-right: 4px;
  max-width: 200px;
  text-align: right;
  direction: rtl;
}
.row select option { direction: ltr; color: #1c1c1e; }
.row input:focus, .row select:focus {
  color: var(--accent-light);
}

/* ─── Sub-row indent ─── */
.row.sub { padding-left: 32px; }
.row.sub label { font-size: 14px; color: var(--label2); }

/* ─── Params panel ─── */
.settings-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 16px;
  font-size: 14px;
  color: var(--accent);
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
  border-bottom: 0.5px solid var(--separator);
}
.settings-btn::before { content: '⚙'; font-size: 16px; }
.settings-body { display: none; }
.settings-body.open { display: block; }
.settings-body .row label { font-size: 14px; color: var(--label2); }
.settings-body .row input { color: var(--label2); font-size: 14px; }
.note-text {
  padding: 8px 16px 12px;
  font-size: 11px;
  color: var(--label2);
  line-height: 1.4;
}

/* ─── Result sticky bar ─── */
.result-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: rgba(255,255,255,0.92);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--separator);
  padding: 10px 16px calc(10px + var(--safe-bottom));
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}
.result-bar .r-block { display: flex; flex-direction: column; gap: 2px; }
.result-bar .r-label {
  font-size: 11px;
  color: var(--label2);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.result-bar .r-val {
  font-size: 20px;
  font-weight: 700;
  color: #1a7a2e;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.3px;
}
.result-bar .r-val.insufficient {
  color: var(--red);
  font-size: 14px;
  font-weight: 600;
}
.result-bar .r-val-div {
  font-size: 15px;
  font-weight: 600;
  color: var(--label);
  font-variant-numeric: tabular-nums;
}
.result-bar .r-spacer { flex: 1; }
.result-bar .r-actions { display: flex; gap: 8px; align-items: center; }

/* Touch-устройства (iPhone/iPad): убираем blur — меньше нагрузка на GPU */
@media (hover: none) and (pointer: coarse) {
  .result-bar {
    background: #f2f2f7;
    -webkit-backdrop-filter: none;
    backdrop-filter: none;
  }
}

.btn-icon {
  width: 36px; height: 36px;
  border-radius: 18px;
  background: var(--bg);
  border: none;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--accent);
  -webkit-tap-highlight-color: transparent;
}
.btn-icon:active { opacity: 0.6; }

.btn-secondary {
  border: 0.5px solid var(--separator);
  background: var(--bg);
  color: var(--accent);
  font-size: 13px;
  font-weight: 700;
  padding: 8px 12px;
  border-radius: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.btn-secondary:active { opacity: 0.7; }
.btn-secondary:disabled {
  opacity: 0.45;
  cursor: default;
}

.toast {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  bottom: calc(72px + var(--safe-bottom));
  z-index: 999;
  background: rgba(28,28,30,0.92);
  color: #fff;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  max-width: min(520px, calc(100vw - 24px));
  text-align: center;
  display: none;
}

.btn-copy-text {
  border: 0.5px solid var(--separator);
  background: rgba(255,255,255,0.85);
  -webkit-backdrop-filter: blur(14px);
  backdrop-filter: blur(14px);
  color: var(--accent);
  font-size: 14px;
  font-weight: 700;
  padding: 8px 12px;
  border-radius: 12px;
  cursor: pointer;
  display: none;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.btn-copy-text:active { opacity: 0.7; }

/* ─── FIO row in result ─── */
.fio-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px 0 0;
}
.fio-row input {
  font-family: var(--font);
  font-size: 14px;
  color: var(--label);
  border: none;
  background: transparent;
  outline: none;
  padding: 10px 16px;
  flex: 1;
  min-width: 0;
}
.fio-row input:focus { color: var(--accent); }

/* ─── Result text block ─── */
.result-text {
  white-space: pre-wrap;
  font-size: 13px;
  color: #1c1c1e;
  padding: 10px 0 14px;
  line-height: 1.35;
  font-variant-numeric: tabular-nums;
}
body.tg-webapp .result-text { color: var(--label); }

/* ─── Calculate button (mobile) ─── */
.calc-btn-wrap {
  padding: 12px 16px 4px;
}
.calc-btn {
  display: block;
  width: 100%;
  padding: 14px;
  font-family: var(--font);
  font-size: 17px;
  font-weight: 600;
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s;
}
.calc-btn:active { opacity: 0.7; }

/* ─── Desktop (>700px): 2-column ─── */
@media (min-width: 701px) {
  /* На больших экранах делаем кнопку по ширине одной колонки */
  .calc-btn-wrap { display: block; max-width: 520px; margin: 0 auto; }
  .btn-copy-text { display: none; }
  .app { max-width: 1100px; }
  .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .columns .col { min-width: 0; }
  .result-bar {
    position: fixed;
    max-width: 1100px;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
  }
  body { padding-bottom: 120px; }
}

/* ─── Telegram Web App ─── */
body.tg-webapp .header { display: none; }
body.tg-webapp { padding-bottom: 60px; }
body.tg-webapp .result-bar {
  bottom: 0;
  background: #f2f2f7;
  -webkit-backdrop-filter: none;
  backdrop-filter: none;
}

/* ─── Mobile refinements ─── */
@media (max-width: 700px) {
  .header h1.header-title { font-size: 14px; }
  .header .header-sub { max-width: 220px; }
  .card { margin: 8px 12px; border-radius: 10px; }
  .card-title { padding-left: 12px; margin: 0 12px; }
  .row { padding: 0 12px; }
  .row.sub { padding-left: 24px; }
  .row input.money-input { width: 120px; }
  .row select { max-width: 160px; font-size: 14px; }
  .result-bar { padding: 8px 12px calc(8px + var(--safe-bottom)); gap: 6px; }
  .result-bar .r-val { font-size: 18px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1 class="header-title">
      <span class="header-brand">Aslan</span>
      <span class="header-sub">Пенсионный аннуитет - калькулятор</span>
    </h1>
    <span class="ver" id="buildVer">v2.1</span>
  </div>

  <div class="columns">
    <!-- ─── LEFT: Inputs ─── -->
    <div class="col">
      <div class="card-title">Данные для расчёта</div>
      <div class="card">
        <div class="row">
          <label>Дата расчёта</label>
          <input type="text" id="calcDate" class="date-input" value="14.04.2026" placeholder="ДД.ММ.ГГГГ" maxlength="10" inputmode="numeric">
        </div>
        <div class="row">
          <label>Дата рождения</label>
          <input type="text" id="birthDate" class="date-input" value="26.03.1968" placeholder="ДД.ММ.ГГГГ" maxlength="10" inputmode="numeric">
        </div>
        <div class="row">
          <label>Пол</label>
          <select id="gender">
            <option value="female">Женщина</option>
            <option value="male">Мужчина</option>
          </select>
        </div>
        <div class="row">
          <label>Гарант. период, лет</label>
          <input type="number" id="guaranteedPeriod" value="10" min="0" max="30" step="1" inputmode="numeric">
        </div>
        <div class="row">
          <label>Физическое состояние</label>
          <select id="physicalCondition">
            <option value="none">Без инвалидности</option>
            <option value="group1">1 группа</option>
            <option value="group2">2 группа</option>
            <option value="group3">3 группа</option>
          </select>
        </div>
      </div>

      <div class="card-title">Премия</div>
      <div class="card">
        <div class="row">
          <label><b>Совокупная премия</b></label>
          <span class="val highlight" id="totalPremiumDisplay">0</span>
        </div>
        <div class="row sub">
          <label class="small">обязательные взносы</label>
          <input type="text" id="mandatoryContrib" class="money-input" value="9 370 000" inputmode="numeric">
        </div>
        <div class="row sub">
          <label class="small">добровольные взносы</label>
          <input type="text" id="voluntaryContrib" class="money-input" value="0" inputmode="numeric">
        </div>
        <div class="row sub">
          <label class="small">профессиональные взносы</label>
          <input type="text" id="professionalContrib" class="money-input" value="0" inputmode="numeric">
        </div>
        <div class="row sub">
          <label class="small">собственные средства</label>
          <input type="text" id="ownFunds" class="money-input" value="0" inputmode="numeric">
        </div>
        <div class="row sub">
          <label class="small">добавление за счёт бонуса</label>
          <input type="text" id="bonusContrib" class="money-input" value="0" inputmode="numeric">
        </div>
        <div class="row">
          <label class="small">Выкупная из иных КСЖ</label>
          <input type="text" id="surrenderFromOther" class="money-input" value="0" inputmode="numeric">
        </div>
        <div class="row">
          <label>Из иной КСЖ (ОППВ)</label>
          <select id="fromOtherOPPV">
            <option value="no">Нет</option>
            <option value="yes">Да</option>
          </select>
        </div>
      </div>

      <div class="card" style="display:none" aria-hidden="true">
        <div class="settings-btn" id="settingsToggle">Параметры расчёта</div>
        <div class="settings-body" id="settingsPanel">
          <div class="row">
            <label class="small">Ставка дисконтирования, %</label>
            <input type="number" id="discountRate" value="9.0" min="0" max="30" step="0.1" inputmode="decimal">
          </div>
          <div class="row">
            <label class="small">Индексация, %</label>
            <input type="number" id="indexationRate" value="8.0" min="0" max="30" step="0.1" inputmode="decimal">
          </div>
          <div class="row">
            <label class="small">Дивиденд, %</label>
            <input type="number" id="dividendRate" value="11.0" min="0" max="30" step="0.1" inputmode="decimal">
          </div>
          <div class="row">
            <label class="small">Расходы от премии (c), %</label>
            <input type="number" id="expenseC" value="1.5" min="0" max="5" step="0.1" inputmode="decimal">
          </div>
          <div class="row">
            <label class="small">Расходы от выплат (d), %</label>
            <input type="number" id="expenseD" value="3.0" min="0" max="5" step="0.1" inputmode="decimal">
          </div>
          <div class="row">
            <label class="small">Прожиточный минимум, тг</label>
            <input type="number" id="livingWage" value="50851" min="0" step="1" inputmode="numeric">
          </div>
          <div class="note-text">
            По Постановлению АРФР №45 от 07.06.2023
          </div>
        </div>
      </div>
    </div>

    <!-- ─── RIGHT: Results ─── -->
    <div class="col">
      <div class="card-title">Результаты</div>
      <div class="card">
        <div class="row">
          <label>Дата начала выплат</label>
          <span class="val" id="startDate">—</span>
        </div>
        <div class="row">
          <label>Возраст</label>
          <span class="val" id="currentAge">—</span>
        </div>
        <div class="row" style="display:none">
          <label>Мин. возраст аннуитета</label>
          <span class="val" id="retirementAgeDisplay">—</span>
        </div>
        <div class="row">
          <label>Возраст начала выплат</label>
          <span class="val" id="ageAtStart">—</span>
        </div>
        <div class="row" id="deferralRow" style="display:none">
          <label>Период отсрочки</label>
          <span class="val" id="deferralDisplay">—</span>
        </div>
        <div class="row">
          <label>Окончание выплат</label>
          <span class="val" id="endDate">—</span>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <label><b>Недостаток средств</b></label>
          <span class="val highlight" id="shortfall" style="font-size:15px">—</span>
        </div>
        <div class="row" id="bonusRow" style="display:none">
          <label class="small">добрать за счёт бонуса</label>
          <button class="btn-secondary" id="useBonusBtn" type="button" onclick="applyBonusToCoverShortfall()">Добрать за счет бонуса</button>
        </div>
      </div>

      <div class="card">
        <div class="row">
          <label class="small">индексация</label>
          <span class="val" id="indexDisplay" style="font-size:14px">8,0%</span>
        </div>
        <div class="row">
          <label class="small">дивиденд</label>
          <span class="val" id="divDisplay" style="font-size:14px">11,0%</span>
        </div>
        <div class="row">
          <label class="small">вид выплат</label>
          <select id="annuityType" disabled>
            <option value="immediate_lifetime">Немедленный пожизн.</option>
            <option value="deferred_lifetime">Отсроченный пожизн.</option>
          </select>
        </div>
        <div class="row">
          <label class="small">мес. уплаченных ОППВ</label>
          <input type="number" id="oppvMonths" value="0" min="0" step="1" inputmode="numeric" disabled>
        </div>
        <div class="row">
          <label>Выкупная ч/з 2 года достаточна</label>
          <span class="val" id="surrender2y">—</span>
        </div>
      </div>

      <div class="row" style="display:none">
        <label>Мин. ежемесячная выплата (70% ПМ)</label>
        <span class="val" id="minPaymentDisplay">—</span>
      </div>
      <div class="row" style="display:none">
        <label>Фактор (ä)</label>
        <span class="val" id="annuityFactorDisplay">—</span>
      </div>

      <div class="card">
        <div class="row">
          <label><b>Итог</b></label>
          <button class="btn-icon" onclick="copyResult()" title="Скопировать итог">📝</button>
        </div>
        <div class="row" style="align-items:flex-start">
          <div class="result-text" id="resultText">—</div>
        </div>
      </div>

      <div class="calc-btn-wrap">
        <button class="calc-btn" id="calcBtn" type="button" onclick="copyResult()">Скопировать</button>
      </div>
    </div>
  </div>
</div>

<!-- ─── Sticky result bar ─── -->
<div class="result-bar">
  <div class="r-block" style="flex:1;min-width:0">
    <span class="r-label">Ежемесячная выплата</span>
    <span class="r-val" id="annuityPayment">—</span>
  </div>
  <div class="r-block">
    <span class="r-label">Дивиденд</span>
    <span class="r-val-div" id="dividendPayment">—</span>
  </div>
  <div class="r-actions">
    <button class="btn-icon" onclick="sendToTelegram()" title="Отправить в чат" id="tgSendBtn" style="display:none">📨</button>
    <button class="btn-icon" onclick="copyResult()" title="Скопировать итог" id="copyBtn">📝</button>
  </div>
</div>

<div class="toast" id="toast">—</div>

function showToast(msg) {
  try {
    var el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.style.display = 'block';
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function() {
      el.style.display = 'none';
    }, 1000);
  } catch(e) {}
}

function getMaxBonus() {
  // Максимум, который можно направить за счёт бонуса = 11% от необходимой
  // премии для актуального расчёта. Без актуального расчёта — 0.
  var minReq = parseInt(document.body.getAttribute('data-min-required') || '0', 10) || 0;
  if (minReq <= 0) return 0;
  return Math.floor(minReq * BONUS_MAX_RATE);
}

function applyBonusToCoverShortfall() {
  try {
    var bonusEl = document.getElementById('bonusContrib');
    if (!bonusEl) return;
    var maxBonus = getMaxBonus();
    if (maxBonus <= 0) return;
    var current = getMoneyVal('bonusContrib');
    var shortfallNow = parseMoney((document.getElementById('shortfall') || {}).textContent || '0');
    var room = Math.max(0, maxBonus - current);
    if (room <= 0) return;
    // Берём столько, сколько нужно для покрытия недостатка, но не больше 11% от необходимой суммы.
    // Если лимит позволяет — округляем добор вверх до следующей тысячи.
    var add = room;
    if (shortfallNow > 0) {
      var need = Math.min(shortfallNow, room);
      var roundedNeed = Math.ceil(shortfallNow / 1000) * 1000;
      add = (roundedNeed <= room) ? roundedNeed : need;
    }
    if (add <= 0) return;
    bonusEl.value = formatMoney(current + add);
    doCalcNow();
    showToast('Сумма внесена в «Добавление за счёт бонуса»');
  } catch(e) {}
}

function checkOPPV() {
  var fromOther = document.getElementById('fromOtherOPPV').value;
  var monthsEl = document.getElementById('oppvMonths');
  var months = parseInt(monthsEl.value) || 0;
  var surrenderAmt = getMoneyVal('surrenderFromOther');
  var profContrib = getMoneyVal('professionalContrib');
  // По требованию: при наличии проф. взносов стаж ОППВ считаем 60 мес. автоматически
  if (profContrib > 0) {
    months = 60;
    if (monthsEl) monthsEl.value = '60';
  }
  if (fromOther === 'yes' && months > 59 && surrenderAmt > 0) return true;
  if (profContrib > 0 && months >= 60) return true;
  return false;
}

function getMortTable(gender, condition, oppv) {
  if (condition === 'group3') return gender === 'male' ? QX_G3_MALE : QX_G3_FEMALE;
  if (condition === 'group2') return gender === 'male' ? QX_G2_MALE : QX_G2_FEMALE;
  if (condition === 'group1') return gender === 'male' ? QX_G1_MALE : QX_G1_FEMALE;
  if (oppv) return gender === 'male' ? QX_OPPV_MALE : QX_OPPV_FEMALE;
  return gender === 'male' ? QX_MALE : QX_FEMALE;
}
function getQx(age, gender, condition, oppv) {
  if (age < 45) return 0;
  if (age >= 110) return 1.0;

  var val = table[age];
  return val !== undefined ? val : 1.0;
}

           2028:53.5,2029:54,2030:54.5};

function getMinAnnuityAge(gender, calcYear, oppv, birthYear) {
  if (oppv) return 50;
  if (gender === 'male') return 55;
  for (var tryAge = 50; tryAge <= 55; tryAge++) {
    var yearAtAge = birthYear + tryAge;
    if (yearAtAge < calcYear) yearAtAge = calcYear;
    var minForYear = _womenMinByYear(yearAtAge);
    if (tryAge >= Math.ceil(minForYear)) return Math.ceil(minForYear);
  }
  return 55;
}
function computeAnnualFactor(startAge, gender, guaranteedYears, discountRate, indexationRate, condition, oppv) {
  var factor = 0, tpx = 1.0, maxT = OMEGA - startAge;
  for (var t = 0; t < maxT; t++) {
    var age = startAge + t;
    var G = (t < guaranteedYears) ? 1.0 : tpx;
    var H = Math.pow(1 + discountRate, -t);
    var I = (t === 0) ? 1.0 : Math.pow(1 + indexationRate, t);
    factor += I * H * G;
    var qx = getQx(age, gender, condition, oppv);
    tpx *= (1 - qx);
    if (tpx <= 1e-15) break;
  }
  return factor;

function parseDateInput(str) {
  if (!str) return null;
  var m = str.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  if (!m) return null;
  var d = new Date(+m[3], +m[2] - 1, +m[1]);
  if (isNaN(d.getTime())) return null;
  return d;
}

  if (str.indexOf('.') !== -1) return parseDateInput(str);

  return new Date(+parts[0], +parts[1] - 1, +parts[2]);
}

  return pad2(d.getDate()) + '.' + pad2(d.getMonth() + 1) + '.' + d.getFullYear();
}

  var age = ref.getFullYear() - birth.getFullYear();

  if (m < 0 || (m === 0 && ref.getDate() < birth.getDate())) age--;

}

}
function formatInt(n) {
  if (n === null || n === undefined || isNaN(n)) return '\u2014';

function formatMoney(n) {

function selectAllOnFocus(el) {
  // 1-й клик/тап: выделить всё
  // 2-й клик/тап (когда уже в фокусе): поставить курсор точечно
  var justFocused = false;
  el.addEventListener('focus', function() {
    var inp = this;
    justFocused = true;
    try { setTimeout(function() { inp.select(); }, 30); } catch(e) {}
  });
  el.addEventListener('blur', function() {
    justFocused = false;
  });
  // Не даём первому mouseup/touchend снять выделение, сделанное на focus.
  function eatFirstPointerEnd(e) {
    if (!justFocused) return;
    try { e.preventDefault(); } catch(_) {}
    justFocused = false;
  }
  el.addEventListener('mouseup', eatFirstPointerEnd);
  el.addEventListener('touchend', eatFirstPointerEnd);
  // Любая клавиатурная навигация/ввод отключает "режим первого клика"
  el.addEventListener('keydown', function() { justFocused = false; });
  el.addEventListener('input', function() { justFocused = false; });
}

      } catch(e) {}
    }
    scheduleCalc();
  }
  el.addEventListener('input', function() {
    _formatMoneyLive(el);
    calc();
  });
  el.addEventListener('keyup', calc);
  el.addEventListener('change', calc);
  el.addEventListener('blur', function() {
    var raw = parseMoney(el.value);
    // Поле "добавление за счёт бонуса" ограничиваем 11% от необходимой суммы
    if (el.id === 'bonusContrib') {
      var maxBonus = getMaxBonus();
      if (maxBonus > 0 && raw > maxBonus) {
        raw = maxBonus;
        showToast('Максимум за счёт бонуса: ' + formatMoney(maxBonus) + ' тг');
      }
    }
    el.value = formatMoney(raw);
    calc();
  });
  selectAllOnFocus(el);
}
function initDateInput(el) {
  el.addEventListener('input', function() {
    var v = this.value.replace(/[^\d.]/g, '');
    var digits = v.replace(/\./g, '');
    if (digits.length > 8) digits = digits.substring(0, 8);
    var out = '';
    for (var i = 0; i < digits.length; i++) {
      if (i === 2 || i === 4) out += '.';
      out += digits[i];
    }
    if (out !== this.value) this.value = out;
    scheduleCalc();
  });
  el.addEventListener('keyup', scheduleCalc);
  el.addEventListener('change', scheduleCalc);
  selectAllOnFocus(el);
}
function getMoneyVal(id) {
  var el = document.getElementById(id);
  return el ? parseMoney(el.value) : 0;
}
function updateTotalPremium() {
  var total = getMoneyVal('mandatoryContrib') + getMoneyVal('voluntaryContrib')
    + getMoneyVal('professionalContrib') + getMoneyVal('ownFunds')
    + getMoneyVal('bonusContrib') + getMoneyVal('surrenderFromOther');
  var el = document.getElementById('totalPremiumDisplay');
  if (el) el.textContent = formatMoney(total);
}

function calculate() {
  try { _calculate(); } catch(e) {
    var d = document.getElementById('annuityPayment');
    if (d) d.textContent = 'Ошибка: ' + e.message;
  }
}
function autoSetAnnuityType(currentAge, minAgeInt) {
  var el = document.getElementById('annuityType');
  if (!el) return;
  var should = (currentAge >= minAgeInt) ? 'immediate_lifetime' : 'deferred_lifetime';
  if (el.value !== should) el.value = should;
}
function _calculate() {
  var calcDateStr = document.getElementById('calcDate').value.trim();
  var birthDateStr = document.getElementById('birthDate').value.trim();
  if (!parseDateInput(calcDateStr) || !parseDateInput(birthDateStr)) return;
  var gender = document.getElementById('gender').value;
  var guaranteedYears = parseInt(document.getElementById('guaranteedPeriod').value) || 0;
  var discountRate = parseFloat(document.getElementById('discountRate').value) / 100;
  var indexationRate = parseFloat(document.getElementById('indexationRate').value) / 100;
  var dividendRate = parseFloat(document.getElementById('dividendRate').value) / 100;
  var cRate = parseFloat(document.getElementById('expenseC').value) / 100;
  var dRate = parseFloat(document.getElementById('expenseD').value) / 100;
  var livingWage = parseFloat(document.getElementById('livingWage').value) || 50851;
  var condition = document.getElementById('physicalCondition').value;
  var oppv = checkOPPV();

  var bonusContrib = getMoneyVal('bonusContrib');
  var totalPremium = getMoneyVal('mandatoryContrib') + getMoneyVal('voluntaryContrib')
    + getMoneyVal('professionalContrib') + getMoneyVal('ownFunds')
    + bonusContrib + getMoneyVal('surrenderFromOther');

  var calcDate = parseDate(calcDateStr);
  var birthDate = parseDate(birthDateStr);
  var currentAge = calcAge(birthDate, calcDate);
  var calcYear = calcDate.getFullYear();
  if (currentAge >= OMEGA || currentAge < 0) return;

  var hasProfessional = getMoneyVal('professionalContrib') > 0;
  var minCalcAge = hasProfessional ? 40 : 45;
  if (currentAge < minCalcAge) {
    var payEl0 = document.getElementById('annuityPayment');
    var divEl0 = document.getElementById('dividendPayment');
    if (payEl0) {
      payEl0.textContent = 'Расчёт доступен с ' + minCalcAge + ' лет';
      payEl0.className = 'r-val insufficient';
    }
    if (divEl0) divEl0.textContent = '—';

    var d0 = document.getElementById('deferralRow');
    if (d0) d0.style.display = 'none';
    var start0 = document.getElementById('startDate');
    if (start0) start0.textContent = '—';
    var age0 = document.getElementById('currentAge');
    if (age0) age0.textContent = currentAge;
    var ra0 = document.getElementById('retirementAgeDisplay');
    if (ra0) ra0.textContent = '—';
    var as0 = document.getElementById('ageAtStart');
    if (as0) as0.textContent = '—';

    updateResultText();
    return;
  }

  var minAge = getMinAnnuityAge(gender, calcYear, oppv, birthDate.getFullYear());
  var minAgeInt = Math.ceil(minAge);
  autoSetAnnuityType(currentAge, minAgeInt);
  var deferralYears = 0, startAge = currentAge;
  var startPayDate = new Date(calcDate);

  if (currentAge < minAgeInt) {
    deferralYears = minAgeInt - currentAge;
    startAge = minAgeInt;
    startPayDate = new Date(birthDate.getFullYear() + minAgeInt, birthDate.getMonth(), birthDate.getDate());
    if (startPayDate <= calcDate) {
      startPayDate = new Date(calcDate);
      deferralYears = 0;
      startAge = currentAge;
    }
  }

  var annualFactor = computeAnnualFactor(startAge, gender, guaranteedYears, discountRate, indexationRate, condition, oppv);
  var periodicFactor = annualFactor - 11 / 24;
  var deferralDiscount = (deferralYears > 0) ? Math.pow((1 + indexationRate) / (1 + discountRate), deferralYears) : 1.0;
  var netFactorDeferred = periodicFactor * deferralDiscount;
  var grossFactor = netFactorDeferred * (1 + dRate) / (1 - cRate);
  var annualPayment = totalPremium / grossFactor;
  var indexFirst = Math.pow(1 + indexationRate, Math.max(deferralYears, 0));
  var periodicPayment = Math.round(annualPayment / 12 * indexFirst);
  var minPen = Math.ceil(0.70 * livingWage);
  var minRequiredPremium = Math.ceil(grossFactor * minPen * 12);

  // Ограничиваем добавление за счёт бонуса 11% от необходимой премии
  var maxBonus = Math.floor(minRequiredPremium * BONUS_MAX_RATE);
  if (bonusContrib > maxBonus) {
    bonusContrib = maxBonus;
    var bEl = document.getElementById('bonusContrib');
    if (bEl) bEl.value = formatMoney(bonusContrib);
    totalPremium = getMoneyVal('mandatoryContrib') + getMoneyVal('voluntaryContrib')
      + getMoneyVal('professionalContrib') + getMoneyVal('ownFunds')
      + bonusContrib + getMoneyVal('surrenderFromOther');
    var tEl = document.getElementById('totalPremiumDisplay');
    if (tEl) tEl.textContent = formatMoney(totalPremium);
  }
  // Запоминаем актуальную необходимую сумму, чтобы кнопка/клампы могли использовать её вне _calculate
  document.body.setAttribute('data-min-required', String(minRequiredPremium));

  var shortfall = Math.max(0, minRequiredPremium - totalPremium);
  // Дивиденд считается от совокупной премии (суммы договора).
  var annualDividend = (totalPremium > 0) ? Math.round(totalPremium * dividendRate) : 0;

  var surrender2ySufficient = '\u041d\u0435\u0442';
  if (totalPremium > 0 && startAge + 2 < OMEGA) {
    var af2y = computeAnnualFactor(startAge + 2, gender, Math.max(0, guaranteedYears - 2), discountRate, indexationRate, condition, oppv);
    var pf2y = af2y - 11 / 24;
    var gf2y = pf2y * (1 + dRate) / (1 - cRate);
    var minPen2y = Math.round(minPen * Math.pow(1.07, 2));
    var minRequired2y = Math.ceil(gf2y * minPen2y * 12);
    var annPayY1 = annualPayment;
    var annPayY2 = annualPayment * (1 + indexationRate);
    var remaining = Math.round(totalPremium - (annPayY1 + annPayY2) - totalPremium * cRate - (annPayY1 + annPayY2) * dRate);
    if (remaining >= minRequired2y) surrender2ySufficient = '\u0414\u0430';
  }

  document.getElementById('totalPremiumDisplay').textContent = formatMoney(totalPremium);
  document.getElementById('startDate').textContent = formatDate(startPayDate);
  document.getElementById('currentAge').textContent = currentAge;
  document.getElementById('retirementAgeDisplay').textContent = minAgeInt;
  document.getElementById('ageAtStart').textContent = startAge;

  var deferralRow = document.getElementById('deferralRow');
  if (deferralYears > 0) {
    deferralRow.style.display = '';
    document.getElementById('deferralDisplay').textContent = deferralYears + ' \u043b\u0435\u0442';
  } else {
    deferralRow.style.display = 'none';
  }

  document.getElementById('endDate').textContent = '\u043f\u043e\u0436\u0438\u0437\u043d\u0435\u043d\u043d\u043e';
  document.getElementById('shortfall').textContent = shortfall > 0 ? formatInt(shortfall) : '0';
  document.getElementById('shortfall').className = 'val ' + (shortfall > 0 ? 'red' : 'highlight');
  document.getElementById('indexDisplay').textContent = (indexationRate * 100).toFixed(1) + '%';
  document.getElementById('divDisplay').textContent = (dividendRate * 100).toFixed(1) + '%';
  document.getElementById('surrender2y').textContent = surrender2ySufficient;
  document.getElementById('minPaymentDisplay').textContent = formatNum(minPen) + ' \u0442\u0433';
  document.getElementById('annuityFactorDisplay').textContent = grossFactor.toFixed(4);

  var payEl = document.getElementById('annuityPayment');
  var divEl = document.getElementById('dividendPayment');
  var bonusRow = document.getElementById('bonusRow');
  var bonusBtn = document.getElementById('useBonusBtn');
  var bonusRoom = Math.max(0, maxBonus - bonusContrib);
  if (bonusRow) bonusRow.style.display = (shortfall > 0 && bonusRoom > 0) ? '' : 'none';
  if (bonusBtn) bonusBtn.disabled = !(shortfall > 0 && bonusRoom > 0);
  if (shortfall > 0) {
    payEl.textContent = '\u041d\u0435\u0434\u043e\u0441\u0442\u0430\u0442\u043e\u0447\u043d\u043e ' + formatInt(shortfall) + ' \u0442\u0435\u043d\u0433\u0435';
    payEl.className = 'r-val insufficient';
    divEl.textContent = '\u2014';
  } else {
    payEl.textContent = formatInt(periodicPayment) + ' \u0442\u0433/\u043c\u0435\u0441';
    payEl.className = 'r-val';
    divEl.textContent = formatInt(annualDividend) + ' \u0442\u0433';
  }
  updateResultText();
}

/* Button handler (called from onclick in HTML) */
function doCalcNow() {
  updateTotalPremium();
  calculate();
}

var SAVE_KEY = 'annuityCalcState';
var SAVE_FIELDS = [
  'calcDate','birthDate','gender','annuityType','guaranteedPeriod',
  'physicalCondition','mandatoryContrib','voluntaryContrib',
  'professionalContrib','ownFunds','bonusContrib','surrenderFromOther',
  'fromOtherOPPV','oppvMonths','discountRate','indexationRate',
  'dividendRate','expenseC','expenseD','livingWage'
];

function saveState() {
  try {
    var data = {};
    for (var i = 0; i < SAVE_FIELDS.length; i++) {
      var el = document.getElementById(SAVE_FIELDS[i]);
      if (el) data[SAVE_FIELDS[i]] = el.value;
    }
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadState() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    for (var i = 0; i < SAVE_FIELDS.length; i++) {
      var id = SAVE_FIELDS[i];
      if (data[id] === undefined) continue;
      var el = document.getElementById(id);
      if (!el) continue;
      el.value = data[id];
    }
  } catch(e) {}
}

var calcTimer = null;
function scheduleCalc() {
  clearTimeout(calcTimer);
  calcTimer = setTimeout(doCalcNow, 180);
}

// На iOS/iPadOS частые записи в localStorage сильно тормозят UI.
// Поэтому сохраняем состояние отложенно и не на каждую клавишу.
var saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    saveState();
  }, 900);
}

function _fmt2(n) { return (n < 10 ? '0' : '') + n; }
function formatDateDDMMYYYY(d) {
  return _fmt2(d.getDate()) + '.' + _fmt2(d.getMonth() + 1) + '.' + d.getFullYear();
}
function autoSetCalcDateToday() {
  var el = document.getElementById('calcDate');
  if (!el) return;
  // Всегда ставим сегодняшнюю дату при открытии страницы.
  el.value = formatDateDDMMYYYY(new Date());
}

var appInitialized = false;
function initApp() {
  if (appInitialized) return;
  appInitialized = true;
  loadState();
  try {
    var toggle = document.getElementById('settingsToggle');
    if (toggle) toggle.addEventListener('click', function() {
      document.getElementById('settingsPanel').classList.toggle('open');
    });

    var moneyInputs = document.querySelectorAll('.money-input');
    for (var i = 0; i < moneyInputs.length; i++) initMoneyInput(moneyInputs[i]);

    autoSetCalcDateToday();
    var dateInputs = document.querySelectorAll('.date-input');
    for (var j = 0; j < dateInputs.length; j++) initDateInput(dateInputs[j]);

    var allInputs = document.querySelectorAll('input');
    for (var k = 0; k < allInputs.length; k++) {
      var el = allInputs[k];
      if (!el.classList.contains('money-input') && !el.classList.contains('date-input')) {
        el.addEventListener('input', scheduleCalc);
        el.addEventListener('change', scheduleCalc);
        selectAllOnFocus(el);
      }
    }
    var allSelects = document.querySelectorAll('select');
    for (var s = 0; s < allSelects.length; s++) {
      allSelects[s].addEventListener('change', scheduleCalc);
    }

    // Автосохранение: на изменения и при уходе со страницы
    document.addEventListener('input', scheduleSave, true);
    document.addEventListener('change', scheduleSave, true);
    window.addEventListener('pagehide', saveState);
  } catch(e) {}

  updateTotalPremium();
  calculate();
  updateResultText();
}

/* ═══════════ Telegram Web App ═══════════ */
var tg = window.Telegram && window.Telegram.WebApp;
var isTgWebApp = !!(tg && tg.initData);

function initTelegram() {
  if (!isTgWebApp) return;
  tg.ready();
  tg.expand();
  document.body.classList.add('tg-webapp');

  var theme = tg.themeParams || {};
  if (theme.bg_color) {
    document.documentElement.style.setProperty('--bg', theme.bg_color);
  }
  if (theme.secondary_bg_color) {
    document.documentElement.style.setProperty('--card', theme.secondary_bg_color);
  }
  if (theme.text_color) {
    document.body.style.color = theme.text_color;
    document.documentElement.style.setProperty('--label', theme.text_color);
  }
  if (theme.hint_color) {
    document.documentElement.style.setProperty('--label2', theme.hint_color);
  }
  if (theme.button_color) {
    document.documentElement.style.setProperty('--accent', theme.button_color);
  }

  var sendBtn = document.getElementById('tgSendBtn');
  if (sendBtn) sendBtn.style.display = '';

  tg.MainButton.setText('Отправить результат');
  tg.MainButton.show();
  tg.MainButton.onClick(sendToTelegram);
}

function buildResultText() {
  var pay = document.getElementById('annuityPayment').textContent || '';
  var div = document.getElementById('dividendPayment').textContent || '';
  var premium = document.getElementById('totalPremiumDisplay').textContent || '';
  var shortfall = document.getElementById('shortfall') ? (document.getElementById('shortfall').textContent || '') : '';
  var birth = document.getElementById('birthDate').value || '';
  var calcD = document.getElementById('calcDate').value || '';
  var gender = document.getElementById('gender').value === 'male' ? 'Мужчина' : 'Женщина';
  var startD = document.getElementById('startDate').textContent || '';
  var age = document.getElementById('currentAge').textContent || '';
  var ageStart = document.getElementById('ageAtStart').textContent || '';
  var indexDisp = document.getElementById('indexDisplay') ? (document.getElementById('indexDisplay').textContent || '') : '';
  var indexRate = 0.08;
  try {
    var irEl = document.getElementById('indexationRate');
    var ir = irEl ? parseFloat(irEl.value) : NaN;
    if (!isNaN(ir)) indexRate = ir / 100;
  } catch(e) {}
  var condition = document.getElementById('physicalCondition');
  var condText = condition.options[condition.selectedIndex].text;
  var insufficient = (pay.indexOf('Недостаточно') !== -1);

  function addYearSuffix(s) {
    s = (s || '').trim();
    if (!s) return s;
    // если уже есть "г" / "г." в конце — не дублируем
    var low = s.toLowerCase();
    if (low.length >= 1 && low[low.length - 1] === 'г') return s + '.';
    if (low.length >= 2 && low.substring(low.length - 2) === 'г.') return s;
    return s + ' г.';
  }

  function monthsUntil(d1, d2) {
    if (!d1 || !d2) return 0;
    var n = (d2.getFullYear() - d1.getFullYear()) * 12 + (d2.getMonth() - d1.getMonth());
    if (d2.getDate() < d1.getDate()) n--;
    return n < 0 ? 0 : n;
  }
  function sumMonthlyIndexed(monthlyFirst, months, rate) {
    var total = 0;
    for (var m = 0; m < months; m++) {
      var y = Math.floor(m / 12);
      total += monthlyFirst * Math.pow(1 + rate, y);
    }
    return Math.round(total);
  }

  var lines = [];
  lines.push('Пенсионный аннуитет - расчет от ' + addYearSuffix(calcD));
  lines.push('');
  lines.push('👤 ' + gender + ', ' + addYearSuffix(birth));
  lines.push('🎂 Возраст: ' + age);
  if (condText !== 'Без инвалидности') lines.push('🦾 Инвалидность: ' + condText);
  lines.push('');
  var applied = Math.max(0, getMoneyVal('bonusContrib'));
  // Если средств недостаточно — показываем необходимую сумму выше "Суммы договора"
  if (insufficient) {
    var minReq = parseInt(document.body.getAttribute('data-min-required') || '0', 10) || 0;
    if (minReq > 0) {
      lines.push('🎯 Сумма необходимая для заключения договора: ' + formatInt(minReq) + ' тг');
    }
  }
  var premiumLabel = insufficient ? 'Сумма перевода' : 'Сумма договора';
  if (applied > 0) {
    lines.push('💰 ' + premiumLabel + ': ' + premium + ' тг (включая ' + formatInt(applied) + ' тенге за счет бонуса)');
  } else {
    lines.push('💰 ' + premiumLabel + ': ' + premium + ' тг');
  }
  if (!insufficient) {
    lines.push('📆 Начало выплат: ' + startD + ' (' + ageStart + ' лет)');
  }
  var gEl = document.getElementById('guaranteedPeriod');
  var gYears = 0;
  try { gYears = gEl ? (parseInt(gEl.value, 10) || 0) : 0; } catch(e) { gYears = 0; }
  lines.push('🛡️ Гарантированный период: ' + (gYears > 0 ? (gYears + ' лет') : 'нет'));
  // Сумма выплат за гарантированный период, с годовой индексацией
  var mG0 = parseMoney(pay);
  if (!insufficient && gYears > 0 && mG0 > 0) {
    var totalG0 = sumMonthlyIndexed(mG0, gYears * 12, indexRate);
    lines.push('🧾 За гарантированный период компания выплатит: ' + formatInt(totalG0) + ' тг');
  }
  lines.push('');
  if (insufficient) {
    lines.push('❌ Недостаточно ' + (shortfall || '0') + ' тенге');
  } else {
    var payLine = '✅ Ежемесячная выплата: ' + pay + ' (пожизненно, индексация ' + (indexDisp || '8.0%') + ')';
    lines.push(payLine);

    // Сумма выплат до 63 лет (по дате начала выплат), с годовой индексацией
    var bD = parseDateInput((birth || '').trim());
    var sD = parseDate((startD || '').trim());
    if (bD && sD) {
      var pension63 = new Date(bD.getFullYear() + 63, bD.getMonth(), bD.getDate());
      var months = monthsUntil(sD, pension63);
      var m0 = parseMoney(pay);
      if (months > 0 && m0 > 0) {
        var totalTo63 = sumMonthlyIndexed(m0, months, indexRate);
        lines.push('⏳ До пенсии получите ежемесячными выплатами: ' + formatInt(totalTo63) + ' тг');
      } else {
        lines.push('⏳ До пенсии получите ежемесячными выплатами: 0 тг');
      }
    }
    var fullDiv = Math.max(0, parseMoney(div));
    var maxBonus = getMaxBonus();
    var isBonusLimitExhausted = (maxBonus > 0 && applied >= maxBonus);
    // В счет суммы договора = "Добавление за счёт бонуса"
    var inContract = Math.min(applied, fullDiv);
    // Если лимит 11% исчерпан — на руки 0
    var cash = isBonusLimitExhausted ? 0 : Math.max(0, fullDiv - inContract);
    if (fullDiv > 0 && applied > 0) {
      lines.push('🎁 Дивиденд: ' + formatInt(fullDiv) + ' тг (единовременно)');
      lines.push('   - ' + formatInt(inContract) + ' тг — в счет суммы договора');
      lines.push('   - ' + formatInt(cash) + ' тг — на руки');
    } else {
      lines.push('🎁 Дивиденд: ' + div + ' (единовременно)');
    }
  }
  return lines.join('\n');
}

function updateResultText() {
  var el = document.getElementById('resultText');
  if (!el) return;
  el.textContent = buildResultText();
}

function sendToTelegram() {
  if (!isTgWebApp) return;
  var text = buildResultText();
  try {
    tg.sendData(text);
  } catch(e) {}
}

function copyResult() {
  var text = buildResultText();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      alert('Итог скопирован');
    }, function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  try {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('Итог скопирован');
  } catch(e) {
    alert('Не удалось скопировать.');
  }
}

/* Одна инициализация: повторные вызовы навешивали обработчики и тормозили iOS */
function bootOnce() {
  initApp();
  initTelegram();
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootOnce);
} else {
  setTimeout(bootOnce, 0);
}
window.addEventListener('pageshow', function() {
  updateTotalPremium();
  calculate();
  updateResultText();
});
</script>
